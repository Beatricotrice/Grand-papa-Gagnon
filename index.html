<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand-Papa — 1935–2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --linen: #F0EBE1;
    --ink: #2A2015;
    --ink-muted: #6B5E4A;
    --ink-faint: #9C8E7A;
    --divider: rgba(107,94,74,0.15);
    --blue: #378ADD;
    --blue-light: #B5D4F4;
    --H: 220px; /* hauteur fixe de toutes les mosaïques */
  }

  html, body {
    min-height: 100%;
    width: 100%;
    max-width: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
  }

  .app-header {
    padding: 52px 24px 20px;
    border-bottom: 0.5px solid var(--divider);
  }
  .app-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.1;
  }
  .app-sub {
    font-size: 13px;
    color: var(--ink-faint);
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  .feed { padding-bottom: 64px; }
  .moment { padding: 28px 24px 0; }

  .moment-year {
    font-size: 11px;
    font-weight: 500;
    color: var(--blue);
    letter-spacing: 0.08em;
    margin-bottom: 3px;
    text-transform: uppercase;
  }
  .moment-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.25;
    margin-bottom: 14px;
  }

  /* ── Tuile de base ── */
  .photo-tile {
    background: var(--linen);
    border: 0.5px dashed rgba(107,94,74,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.12s;
  }
  .photo-tile:active { opacity: 0.75; }
  .photo-tile img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
  .tile-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--ink-faint);
    display: flex; align-items: center; justify-content: center;
  }
  .tile-label { font-size: 12px; color: var(--ink-faint); }

  /*
    Stratégie :
    - .moment a padding-left: 24px pour le texte
    - Les mosaïques s'échappent avec margin-left: -24px pour partir du bord gauche de l'écran
    - Puis on réintroduit padding-left: 24px sur le conteneur flex
    - overflow: hidden coupe à droite proprement
    - Pour le strip scrollable : overflow-x: auto au lieu de hidden
  */
  /* Base commune */
  .mosaic, .strip {
    margin: 0 0 14px -24px;
    padding-left: 24px;
    height: var(--H);
    display: flex;
    gap: 0;
  }

  /* Mosaïque fixe — gap entre tuiles via gap CSS */
  .mosaic { overflow: hidden; gap: 3px; }

  /* Strip scrollable — déborde jusqu'au bord droit, scroll horizontal */
  .strip {
    margin-right: -24px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .strip::-webkit-scrollbar { display: none; }
  /* Espaceur à la fin du strip — indique visuellement la fin du scroll */
  .strip-end { flex-shrink: 0; width: 24px; }
  .strip .photo-tile {
    width: 70vw;
    max-width: 280px;
    height: 100%;
    flex-shrink: 0;
  }

  /* 1 photo — s'étend jusqu'à la marge droite */
  .mosaic.m1 .photo-tile { flex: 1; height: 100%; min-width: 0; }

  /* 2 photos — grande gauche, petite droite */
  .mosaic.m2 .photo-tile:nth-child(1) { width: 58%; height: 100%; flex-shrink: 0; }
  .mosaic.m2 .photo-tile:nth-child(2) { flex: 1; height: 100%; min-width: 0; }

  /* 3 photos — grande gauche + 2 empilées droite */
  .mosaic.m3 .photo-tile.main { width: 54%; height: 100%; flex-shrink: 0; }
  .mosaic.m3 .col {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
    min-width: 0;
  }
  .mosaic.m3 .col .photo-tile { width: 100%; flex: 1; }

  /* layout:strip — toutes les photos côte à côte égales */
  .mosaic.m2-strip .photo-tile { flex: 1; height: 100%; min-width: 0; }
  .mosaic.m3-strip .photo-tile { flex: 1; height: 100%; min-width: 0; }

  /* 4 photos mixed : grande gauche | 2 empilées centre | grande droite */
  .mosaic.m4-mixed .photo-tile.main-left  { width: 38%; height: 100%; flex-shrink: 0; }
  .mosaic.m4-mixed .col {
    display: flex;
    flex-direction: column;
    gap: 3px;
    width: 24%;
    flex-shrink: 0;
  }
  .mosaic.m4-mixed .col .photo-tile { width: 100%; flex: 1; }
  .mosaic.m4-mixed .photo-tile.main-right { flex: 1; height: 100%; min-width: 0; }

  .moment-desc {
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.7;
    padding-bottom: 28px;
    border-bottom: 0.5px solid var(--divider);
  }
  .moment:last-child .moment-desc { border-bottom: none; }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: #1A1208;
    z-index: 100;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }

  .lb-top {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 14px 12px 8px;
    gap: 8px;
  }
  @supports (padding-top: env(safe-area-inset-top)) {
    .lb-top { padding-top: calc(env(safe-area-inset-top) + 10px); }
    .lb-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 12px) !important; }
  }

  .lb-info {
    flex: 1; min-width: 0;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-info-year { color: var(--blue-light); font-weight: 500; }
  .lb-info-sep { margin: 0 5px; color: rgba(255,255,255,0.25); }

  .lb-counter {
    flex-shrink: 0;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
    padding: 0 4px;
  }

  .lb-close {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .lb-close:active { background: rgba(255,255,255,0.2); }

  .lb-photo-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .lb-slider {
    display: flex;
    height: 100%;
    transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94);
    will-change: transform;
  }
  .lb-slide {
    flex-shrink: 0;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 6px;
  }
  .lb-slide img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 3px;
    display: block;
  }
  .lb-placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; width: 100%; height: 100%;
  }
  .lb-placeholder span { font-size: 13px; color: rgba(255,255,255,0.25); }

  /* Flèches centrées verticalement sur les bords */
  .lb-arrow {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 64px; height: 96px;
    background: transparent;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    z-index: 2;
  }
  .lb-arrow.prev { left: 0; }
  .lb-arrow.next { right: 0; }
  .lb-arrow.hidden { opacity: 0; pointer-events: none; }
  .lb-arrow svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.55); fill: none; }
  .lb-arrow:active svg { stroke: rgba(255,255,255,0.9); }

  /* Footer légende uniquement — hauteur fixe même sans texte */
  .lb-bottom {
    flex-shrink: 0;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 24px 16px;
  }
  .lb-caption {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    line-height: 1.45;
    text-align: center;
  }

  /* Mode immersif — UI caché au tap */
  .lb-top, .lb-bottom, .lb-arrow {
    transition: opacity 0.22s, visibility 0.22s;
  }
  .lightbox.immersive .lb-top,
  .lightbox.immersive .lb-bottom,
  .lightbox.immersive .lb-arrow { opacity: 0; visibility: hidden; pointer-events: none; }
  .lightbox.immersive .lb-slide { padding: 0; }
  .lb-slide { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .lb-slide img { touch-action: pinch-zoom; user-select: none; }
</style>
</head>

<script>
let lbMomentIdx = 0;
let lbPhotoIdx  = 0;

const ICON = `<div class="tile-icon">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <rect x="1" y="2.5" width="14" height="11" rx="2" stroke="#9C8E7A" stroke-width="1.2"/>
    <circle cx="8" cy="8" r="2.5" stroke="#9C8E7A" stroke-width="1.2"/>
  </svg></div><span class="tile-label">Photo à venir</span>`;

// Génère une tuile — lit position sur la photo en priorité, sinon le défaut du moment
function tile(mi, pi, p, extraClass, defaultPos) {
  const cls = 'photo-tile' + (extraClass ? ' ' + extraClass : '');
  const pos = p.position || defaultPos || 'top';
  const inner = p.src
    ? `<img src="${p.src}" alt="${p.caption||''}" style="object-position:${pos};">`
    : ICON;
  return `<div class="${cls}" onclick="openLightbox(${mi},${pi})">${inner}</div>`;
}

// Génère une tuile inline pour strip (largeur en vw)
function stripTile(mi, pi, p, vw, defaultPos) {
  const pos = p.position || defaultPos || 'top';
  const inner = p.src
    ? `<img src="${p.src}" alt="${p.caption||''}" style="object-position:${pos};">`
    : ICON;
  return `<div class="photo-tile" style="width:${vw}vw;height:100%;flex-shrink:0;" onclick="openLightbox(${mi},${pi})">${inner}</div>`;
}

function buildMosaic(mi, m) {
  const photos = m.photos;
  const n = photos.length;
  if (n === 0) return '';

  const defaultPos = m.position || 'top';
  const layout     = m.layout !== undefined ? m.layout : 'mixed';
  const columns    = m.columns; // défini = strip scrollable avec pattern mixed

  // ── Strip numérique : layout est un nombre ────────────────
  if (typeof layout === 'number') {
    const screenW = window.innerWidth;
    const tilePx  = Math.round((screenW - 24) / layout);
    const tiles = photos.map((p,pi) => {
      const pos = p.position || defaultPos;
      const inner = p.src ? `<img src="${p.src}" alt="${p.caption||''}" style="object-position:${pos};">` : ICON;
      return `<div class="photo-tile" style="width:${tilePx}px;height:100%;flex-shrink:0;" onclick="openLightbox(${mi},${pi})">${inner}</div>`;
    }).join('');
    return `<div class="strip" style="gap:3px;">${tiles}<div class="strip-end"></div></div>`;
  }

  // ── Mixed scrollable : layout:"mixed" + columns défini ───
  if (layout === 'mixed' && columns !== undefined) {
    const screenW  = window.innerWidth;
    const blockPx  = Math.round((screenW - 24) / columns);
    const gap      = 3;

    let blocks = '';
    for (let i = 0; i < n; i += 3) {
      const chunk = photos.slice(i, i + 3);

      if (chunk.length === 1) {
        const p0 = chunk[0];
        const pos0 = p0.position || defaultPos;
        blocks += `<div class="photo-tile" style="width:${blockPx}px;flex-shrink:0;height:100%;" onclick="openLightbox(${mi},${i})">
          ${p0.src ? `<img src="${p0.src}" style="object-position:${pos0};">` : ICON}
        </div>`;
      } else if (chunk.length === 2) {
        const p0=chunk[0], p1=chunk[1];
        const pos0=p0.position||defaultPos, pos1=p1.position||defaultPos;
        blocks += `<div style="width:${blockPx}px;flex-shrink:0;height:100%;display:flex;gap:${gap}px;">
          <div class="photo-tile" style="flex:1;height:100%;" onclick="openLightbox(${mi},${i})">
            ${p0.src?`<img src="${p0.src}" style="object-position:${pos0};">`:ICON}
          </div>
          <div class="photo-tile" style="flex:1;height:100%;" onclick="openLightbox(${mi},${i+1})">
            ${p1.src?`<img src="${p1.src}" style="object-position:${pos1};">`:ICON}
          </div>
        </div>`;
      } else {
        const p0=chunk[0], p1=chunk[1], p2=chunk[2];
        const pos0=p0.position||defaultPos, pos1=p1.position||defaultPos, pos2=p2.position||defaultPos;
        const mainPx = Math.round(blockPx * 0.58);
        blocks += `<div style="width:${blockPx}px;flex-shrink:0;height:100%;display:flex;gap:${gap}px;">
          <div class="photo-tile" style="width:${mainPx}px;height:100%;" onclick="openLightbox(${mi},${i})">
            ${p0.src?`<img src="${p0.src}" style="object-position:${pos0};">`:ICON}
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:${gap}px;">
            <div class="photo-tile" style="flex:1;" onclick="openLightbox(${mi},${i+1})">
              ${p1.src?`<img src="${p1.src}" style="object-position:${pos1};">`:ICON}
            </div>
            <div class="photo-tile" style="flex:1;" onclick="openLightbox(${mi},${i+2})">
              ${p2.src?`<img src="${p2.src}" style="object-position:${pos2};">`:ICON}
            </div>
          </div>
        </div>`;
      }
    }
    return `<div class="strip" style="gap:${gap}px;">${blocks}<div class="strip-end"></div></div>`;
  }

  // ── Mixed fixe pleine largeur ─────────────────────────────
  // weights: tableau optionnel de proportions relatives par photo
  // ex: weights:[1,2] → 1ère photo = 33%, 2ème = 67%
  // Si absent, utilise les proportions par défaut du layout.
  const w = m.weights;

  // Calcule flex values à partir des weights (ou valeurs par défaut)
  function flexVal(defaults) {
    if (!w) return defaults;
    const total = w.reduce((a,b) => a+b, 0);
    return w.map(v => v / total * 100);
  }

  if (n === 1) {
    return `<div class="mosaic m1">${tile(mi,0,photos[0],'',defaultPos)}</div>`;
  }
  if (n === 2) {
    const f = flexVal([58, 42]); // Ces valeurs sont les défauts si weights est absent
    return `<div class="mosaic" style="height:var(--H);display:flex;gap:3px;margin:0 0 14px -24px;padding-left:24px;overflow:hidden;">
      <div class="photo-tile" style="flex:${f[0]}; min-width:0; height:100%;" onclick="openLightbox(${mi},0)">
        ${photos[0].src ? `<img src="${photos[0].src}" style="object-position:${photos[0].position||defaultPos};">` : ICON}
      </div>
      <div class="photo-tile" style="flex:${f[1]}; min-width:0; height:100%;" onclick="openLightbox(${mi},1)">
        ${photos[1].src ? `<img src="${photos[1].src}" style="object-position:${photos[1].position||defaultPos};">` : ICON}
      </div>
    </div>`;
  }
  if (n === 3) {
    const f = flexVal([54, 23, 23]);
    return `<div class="mosaic" style="height:var(--H);display:flex;gap:3px;margin:0 0 14px -24px;padding-left:24px;overflow:hidden;">
      <div class="photo-tile" style="flex:${f[0]};height:100%;" onclick="openLightbox(${mi},0)">${photos[0].src ? `<img src="${photos[0].src}" style="object-position:${photos[0].position||defaultPos};">` : ICON}</div>
      <div style="flex:${f[1]+f[2]};display:flex;flex-direction:column;gap:3px;">
        <div class="photo-tile" style="flex:${w ? w[1]/(w[1]+w[2])*100 : 50}%;width:100%;" onclick="openLightbox(${mi},1)">${photos[1].src ? `<img src="${photos[1].src}" style="object-position:${photos[1].position||defaultPos};">` : ICON}</div>
        <div class="photo-tile" style="flex:${w ? w[2]/(w[1]+w[2])*100 : 50}%;width:100%;" onclick="openLightbox(${mi},2)">${photos[2].src ? `<img src="${photos[2].src}" style="object-position:${photos[2].position||defaultPos};">` : ICON}</div>
      </div>
    </div>`;
  }
  if (n === 4) {
    const f = flexVal([38, 12, 12, 38]);
    return `<div class="mosaic" style="height:var(--H);display:flex;gap:3px;margin:0 0 14px -24px;padding-left:24px;overflow:hidden;">
      <div class="photo-tile" style="flex:${f[0]};height:100%;" onclick="openLightbox(${mi},0)">${photos[0].src ? `<img src="${photos[0].src}" style="object-position:${photos[0].position||defaultPos};">` : ICON}</div>
      <div style="flex:${f[1]+f[2]};display:flex;flex-direction:column;gap:3px;">
        <div class="photo-tile" style="flex:${w ? w[1]/(w[1]+w[2])*100 : 50}%;width:100%;" onclick="openLightbox(${mi},1)">${photos[1].src ? `<img src="${photos[1].src}" style="object-position:${photos[1].position||defaultPos};">` : ICON}</div>
        <div class="photo-tile" style="flex:${w ? w[2]/(w[1]+w[2])*100 : 50}%;width:100%;" onclick="openLightbox(${mi},2)">${photos[2].src ? `<img src="${photos[2].src}" style="object-position:${photos[2].position||defaultPos};">` : ICON}</div>
      </div>
      <div class="photo-tile" style="flex:${f[3]};height:100%;" onclick="openLightbox(${mi},3)">${photos[3].src ? `<img src="${photos[3].src}" style="object-position:${photos[3].position||defaultPos};">` : ICON}</div>
    </div>`;
  }
  // 5+ sans columns → strip à 2 colonnes par défaut
  const tiles = photos.map((p,pi) => stripTile(mi,pi,p,50,defaultPos)).join('');
  return `<div class="strip">${tiles}<div class="strip-end"></div></div>`;
}

function renderFeed() {
  const feed = document.getElementById('feed');
  MOMENTS.forEach((m, mi) => {
    const div = document.createElement('div');
    div.className = 'moment';
    div.innerHTML = `
      <div class="moment-year">${m.year}</div>
      <div class="moment-title">${m.title}</div>
      ${buildMosaic(mi, m)}
      <div class="moment-desc">${m.desc}</div>`;
    feed.appendChild(div);
  });
}

function buildSlider(photos) {
  document.getElementById('lb-slider').innerHTML = photos.map(p => {
    const content = p.src
      ? `<img src="${p.src}" alt="${p.caption||''}">`
      : `<div class="lb-placeholder">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <rect x="2" y="5" width="32" height="26" rx="3" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
            <circle cx="18" cy="18" r="6" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
          </svg>
          <span>Photo à venir</span>
        </div>`;
    return `<div class="lb-slide">${content}</div>`;
  }).join('');
}

function setSliderPos(animated) {
  const s = document.getElementById('lb-slider');
  if (!animated) s.style.transition = 'none';
  s.style.transform = `translateX(${-lbPhotoIdx * 100}%)`;
  if (!animated) requestAnimationFrame(() => { s.style.transition = ''; });
}

function updateMeta() {
  const m = MOMENTS[lbMomentIdx];
  const p = m.photos[lbPhotoIdx];
  const total = m.photos.length;
  document.getElementById('lb-year').textContent    = m.year;
  document.getElementById('lb-title').textContent   = m.title;
  document.getElementById('lb-counter').textContent = total > 1 ? `${lbPhotoIdx+1} / ${total}` : '';
  document.getElementById('lb-caption').textContent = p.caption || '';
  document.getElementById('lb-prev').classList.toggle('hidden', lbPhotoIdx === 0);
  document.getElementById('lb-next').classList.toggle('hidden', lbPhotoIdx === total - 1);
}

function openLightbox(mi, pi) {
  lbMomentIdx = mi; lbPhotoIdx = pi;
  buildSlider(MOMENTS[mi].photos);
  setSliderPos(false);
  updateMeta();
  // Mémorise la position de scroll pour y revenir à la fermeture
  lbScrollY = window.scrollY;
  lb.classList.remove('immersive');
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lb.classList.remove('open', 'immersive');
  document.body.style.overflow = '';
  // Retourne exactement là où l'utilisateur était
  requestAnimationFrame(() => window.scrollTo(0, lbScrollY));
}

function lbNavigate(dir) {
  const next = lbPhotoIdx + dir;
  if (next < 0 || next >= MOMENTS[lbMomentIdx].photos.length) return;
  lbPhotoIdx = next;
  setSliderPos(true);
  updateMeta();
}

const lb     = document.getElementById('lightbox');
const area   = document.getElementById('lb-photo-area');
const sliderEl = document.getElementById('lb-slider');
let lbScrollY = 0;

// ── Tap sur la photo → toggle mode immersif ──────────────
area.addEventListener('click', e => {
  // Ignore si c'est un swipe ou si le clic vient d'une flèche
  if (Math.abs(tcX - tsX) > 10) return;
  if (e.target.closest('.lb-arrow')) return;
  lb.classList.toggle('immersive');
});

// ── Swipe horizontal (navigation entre photos) ───────────
let tsX = 0, tcX = 0, tsY = 0, tcY = 0, swiping = false;

area.addEventListener('touchstart', e => {
  if (e.touches.length > 1) return; // pinch-zoom natif
  if (e.target.closest('.lb-arrow')) return; // ignore les flèches
  tsX = tcX = e.touches[0].clientX;
  tsY = tcY = e.touches[0].clientY;
  swiping = true;
  sliderEl.style.transition = 'none';
}, { passive: true });

area.addEventListener('touchmove', e => {
  if (!swiping || e.touches.length > 1) return;
  tcX = e.touches[0].clientX;
  tcY = e.touches[0].clientY;
  const dx = tcX - tsX;
  const dy = tcY - tsY;

  // Toujours bloquer le scroll de la page pendant qu'on est dans le lightbox
  e.preventDefault();

  // Swipe vers le bas → translation seule, sans opacité
  if (Math.abs(dy) > Math.abs(dx) && dy > 0) {
    lb.style.transform = `translateY(${Math.max(0, dy * 0.6)}px)`;
    return;
  }

  // Swipe horizontal → rubber-band aux extrémités
  const total = MOMENTS[lbMomentIdx].photos.length;
  const atStart = lbPhotoIdx === 0 && dx > 0;
  const atEnd   = lbPhotoIdx === total - 1 && dx < 0;
  if (atStart || atEnd) {
    const dampened = dx * 0.2;
    sliderEl.style.transform = `translateX(calc(${-lbPhotoIdx * 100}% + ${dampened}px))`;
  } else {
    sliderEl.style.transform = `translateX(calc(${-lbPhotoIdx * 100}% + ${dx}px))`;
  }
}, { passive: false });

area.addEventListener('touchend', () => {
  if (!swiping) return;
  swiping = false;
  sliderEl.style.transition = '';
  const dx = tcX - tsX;
  const dy = tcY - tsY;

  // Swipe vers le bas suffisant → ferme (translation seule, sans opacité)
  if (dy > 80 && Math.abs(dy) > Math.abs(dx)) {
    lb.style.transition = 'transform 0.25s';
    lb.style.transform  = 'translateY(100%)';
    setTimeout(() => {
      // Désactive toutes les transitions et remet transform AVANT de retirer .open,
      // sinon le fade-out CSS d'opacité laisse brièvement voir le lightbox repositionné
      lb.style.transition = 'none';
      lb.style.transform  = '';
      lb.getBoundingClientRect(); // force reflow pour appliquer les styles ci-dessus
      closeLightbox();
      requestAnimationFrame(() => { lb.style.transition = ''; });
    }, 250);
    return;
  }

  // Reset la translation verticale si pas assez de swipe vers le bas
  lb.style.transition = 'transform 0.2s';
  lb.style.transform  = '';
  setTimeout(() => { lb.style.transition = ''; }, 200);

  // Swipe horizontal → navigation (retour élastique si aux extrémités)
  const total = MOMENTS[lbMomentIdx].photos.length;
  const atStart = lbPhotoIdx === 0 && dx > 0;
  const atEnd   = lbPhotoIdx === total - 1 && dx < 0;
  if (!atStart && !atEnd && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    lbNavigate(dx < 0 ? 1 : -1);
  } else {
    setSliderPos(true);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  lbNavigate(-1);
  if (e.key === 'ArrowRight') lbNavigate(1);
});

renderFeed();

// Recalcule les largeurs en pixels si l'orientation change
window.addEventListener('resize', () => {
  document.getElementById('feed').innerHTML = '';
  renderFeed();
});
</script>
</body>
</html>
