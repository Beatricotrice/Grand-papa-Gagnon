<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>En mémoire de Grand-Papa</title>
    <style>
        :root {
            --bg-main: #f9f7f2;
            --bg-sheet: #ffffff;
            --bg-photo: #f2efe6;
            --accent-blue: #4e82b4;
            --text-title: #1a1a1a;
            --text-date: #9a938a;
            --line-color: #d1ced0;
            --font-serif: "Times New Roman", Times, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            font-family: var(--font-sans);
            color: var(--text-title);
            -webkit-font-smoothing: antialiased;
        }

        .main-content {
            padding: 50px 30px;
            max-width: 500px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.4rem;
            margin: 0;
            font-weight: 500;
            font-family: var(--font-serif);
        }

        header .lifespan {
            color: var(--text-date);
            font-size: 0.95rem;
            margin-bottom: 50px;
            font-family: var(--font-sans);
            font-weight: 700;
        }

        /* --- TIMELINE --- */
        .timeline-container {
            position: relative;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 9px;
            top: 10px;
            bottom: 25px;
            width: 1px;
            background-color: var(--line-color);
            z-index: 0;
        }

        .event-link {
            display: flex;
            align-items: flex-start;
            margin-bottom: 35px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            -webkit-tap-highlight-color: transparent;
        }

        .dot-container {
            margin-right: 18px;
            margin-top: 4px;
            background-color: var(--bg-main); 
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            background-color: transparent;
            transition: background-color 0.3s ease;
        }

        .event-link.active .dot {
            background-color: var(--accent-blue);
        }

        .event-info .e-date {
            font-size: 0.85rem;
            color: var(--text-date);
            margin-bottom: 2px;
            font-family: var(--font-sans);
            font-weight: 700;
            display: block;
        }

        .e-date::first-letter, .nav-date::first-letter {
            text-transform: uppercase;
        }

        .event-info .e-title {
            font-size: 1.2rem;
            font-weight: 500;
            font-family: var(--font-serif);
        }

        /* --- BOTTOM SHEET (50%) --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.1);
            display: none;
            z-index: 1000;
        }

        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0; right: 0;
            background: var(--bg-sheet);
            border-radius: 30px 30px 0 0;
            padding: 15px 25px 95px; /* Ajusté pour laisser place à la nav */
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1001;
            height: 50vh;
            overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
        }

        .bottom-sheet.active { bottom: 0; }

        .drag-handle {
            width: 40px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin: 0 auto 10px;
        }

        .close-btn {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 26px;
            color: #ccc;
            cursor: pointer;
        }

        .sheet-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 15px 0 10px;
            font-family: var(--font-serif);
            padding-right: 30px;
        }

        .sheet-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #444;
            margin-bottom: 20px;
            font-family: var(--font-sans);
        }

        .photo-area {
            width: 100%;
            height: 180px; /* On gagne un peu de hauteur ici */
            background-color: var(--bg-photo);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #b4aea4;
            overflow: hidden;
        }

        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* --- NAVIGATION BASSE SANS COMPTEUR --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: white;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            border-top: 1px solid #f5f5f5;
            z-index: 1002;
        }

        .nav-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #1a1a1a;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .nav-date {
            font-size: 0.9rem;
            color: var(--text-date);
            font-weight: 700;
            font-family: var(--font-sans);
            text-align: center;
            flex: 1;
        }
    </style>
</head>
<body>

<div class="main-content">
    <header>
        <h1>Grand-Papa</h1>
        <div class="lifespan">1935 — 2026</div>
    </header>
    <div class="timeline-container" id="timeline-list"></div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="sheet">
    <div class="drag-handle"></div>
    <div class="close-btn" onclick="closeSheet()">×</div>
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-text" id="sheet-text"></div>
    <div class="photo-area">
        <img id="main-photo" src="" alt="Souvenir">
        <div id="photo-placeholder" style="text-align: center;">
            <div style="font-size: 24px; border: 1px solid #dcd9d0; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px;">📷</div>
            <div style="font-size: 0.8rem;">Ajouter une photo</div>
        </div>
    </div>
</div>

<div class="bottom-nav" id="bottom-nav">
    <div class="nav-circle" onclick="prevEvent()">⟨</div>
    <div class="nav-date" id="nav-date"></div>
    <div class="nav-circle" onclick="nextEvent()">⟩</div>
</div>

<script>
    const events = [
        { date: "11 décembre 1935", title: "Naissance", text: "Le premier chapitre d'une vie riche et bien remplie.", img: "" },
        { date: "années 1940", title: "L'enfance sur la ferme", text: "Les saisons rythmaient tout : les semailles, les récoltes, les grands repas de famille.", img: "" },
        { date: "années 1950", title: "Les Bermudes", text: "Ses premières grandes aventures et la découverte du monde.", img: "" },
        { date: "1958", title: "Mariage", text: "Le début d'une vie de complicité avec Grand-Maman.", img: "" },
        { date: "1961-1963", title: "Naissance de Myriam et Josée", text: "L'arrivée de ses filles, sa plus grande fierté.", img: "" },
        { date: "1990", title: "La retraite", text: "Le temps de se consacrer à ses passions et à ses proches.", img: "" },
        { date: "2005", title: "50 ans de mariage", text: "Un amour qui traverse le temps, célébré en famille.", img: "" },
        { date: "2025", title: "Ses 90 ans", text: "Un jalon impressionnant célébré avec joie.", img: "" },
        { date: "2026", title: "Il nous a quittés", text: "Un départ serein, laissant derrière lui un héritage de bonté.", img: "" }
    ];

    let currentIndex = 0;
    const sheet = document.getElementById('sheet');
    const overlay = document.getElementById('overlay');
    const nav = document.getElementById('bottom-nav');

    function init() {
        const list = document.getElementById('timeline-list');
        events.forEach((ev, idx) => {
            const item = document.createElement('div');
            item.className = 'event-link';
            item.innerHTML = `
                <div class="dot-container"><div class="dot"></div></div>
                <div class="event-info"><div class="e-date">${ev.date}</div><div class="e-title">${ev.title}</div></div>
            `;
            item.onclick = () => openSheet(idx);
            list.appendChild(item);
        });
    }

    function openSheet(idx) {
        currentIndex = idx;
        updateSheet();
        overlay.style.display = 'block';
        nav.style.display = 'flex';
        setTimeout(() => sheet.classList.add('active'), 10);
    }

    function closeSheet() {
        sheet.classList.remove('active');
        nav.style.display = 'none';
        document.querySelectorAll('.event-link').forEach(el => el.classList.remove('active'));
        setTimeout(() => overlay.style.display = 'none', 300);
    }

    function updateSheet() {
        const ev = events[currentIndex];
        document.querySelectorAll('.event-link').forEach((el, i) => {
            if(i === currentIndex) el.classList.add('active');
            else el.classList.remove('active');
        });
        
        document.getElementById('sheet-title').innerText = ev.title;
        document.getElementById('sheet-text').innerText = ev.text;
        document.getElementById('nav-date').innerText = ev.date;
        
        const img = document.getElementById('main-photo');
        const ph = document.getElementById('photo-placeholder');
        if(ev.img) { img.src = ev.img; img.style.display = 'block'; ph.style.display = 'none'; }
        else { img.style.display = 'none'; ph.style.display = 'block'; }
    }

    function nextEvent() { if(currentIndex < events.length - 1) { currentIndex++; updateSheet(); } }
    function prevEvent() { if(currentIndex > 0) { currentIndex--; updateSheet(); } }

    init();
</script>

</body>
</html>
